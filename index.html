
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>EcoSphere - ESG Management Platform</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>🌍 EcoSphere</h1>
  <div class="user-points">
    <span id="userPointsDisplay">0</span> pts &nbsp; | &nbsp; Level: <span id="userLevel">1</span>
  </div>
</header>

<nav class="tabs">
  <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
  <button class="tab-btn" data-tab="operations">Operational Data</button>
  <button class="tab-btn" data-tab="employees">Employee Participation</button>
  <button class="tab-btn" data-tab="compliance">Compliance</button>
  <button class="tab-btn" data-tab="leaderboard">Leaderboard</button>
</nav>

<main>

  <!-- DASHBOARD -->
  <section id="dashboard" class="tab-content active">
    <h2>Unified ESG Dashboard</h2>
    <div class="score-cards">
      <div class="card">
        <h3>Environmental</h3>
        <div class="score" id="envScore">--</div>
      </div>
      <div class="card">
        <h3>Social</h3>
        <div class="score" id="socialScore">--</div>
      </div>
      <div class="card">
        <h3>Governance</h3>
        <div class="score" id="govScore">--</div>
      </div>
      <div class="card highlight">
        <h3>Overall ESG Score</h3>
        <div class="score" id="overallScore">--</div>
      </div>
    </div>

    <div class="chart-row">
      <canvas id="operationsChart"></canvas>
      <canvas id="complianceChart"></canvas>
    </div>

    <div class="badges-preview">
      <h3>Your Badges</h3>
      <div id="badgeList" class="badge-list"></div>
    </div>
  </section>

  <!-- OPERATIONAL DATA -->
  <section id="operations" class="tab-content">
    <h2>Operational Data Input</h2>
    <form id="opsForm">
      <label>Energy Usage (kWh this month)</label>
      <input type="number" id="energy" required>

      <label>Water Usage (litres this month)</label>
      <input type="number" id="water" required>

      <label>Waste Generated (kg this month)</label>
      <input type="number" id="waste" required>

      <label>% Waste Recycled</label>
      <input type="number" id="recycled" min="0" max="100" required>

      <button type="submit">Save Operational Data</button>
    </form>
    <div id="opsSummary"></div>
  </section>

  <!-- EMPLOYEE PARTICIPATION -->
  <section id="employees" class="tab-content">
    <h2>Log a Sustainability Action</h2>
    <form id="empForm">
      <label>Your Name</label>
      <input type="text" id="empName" required>

      <label>Action Taken</label>
      <select id="empAction">
        <option value="recycle">Recycled correctly (+10)</option>
        <option value="carpool">Carpooled / used public transport (+15)</option>
        <option value="event">Attended sustainability event (+20)</option>
        <option value="idea">Submitted a green idea (+25)</option>
        <option value="energy">Reported energy-saving action (+10)</option>
      </select>

      <button type="submit">Log Action</button>
    </form>
    <div id="empLogList"></div>
  </section>

  <!-- COMPLIANCE -->
  <section id="compliance" class="tab-content">
    <h2>Compliance Checklist</h2>
    <form id="complianceForm">
      <label>Compliance Task</label>
      <input type="text" id="taskName" placeholder="e.g. Annual emissions report" required>
      <label>Deadline</label>
      <input type="date" id="taskDeadline" required>
      <button type="submit">Add Task</button>
    </form>
    <div id="complianceList"></div>
  </section>

  <!-- LEADERBOARD -->
  <section id="leaderboard" class="tab-content">
    <h2>🏆 Employee Leaderboard</h2>
    <div id="leaderboardList"></div>
  </section>

</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="script.js"></script>
</body>
</html>
